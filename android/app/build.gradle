plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

flutter {
    source '../..'
}

android {
    namespace "com.maamahsmix.app"
    compileSdk 36

    defaultConfig {
        applicationId "com.maamahsmix.app"
        minSdkVersion 26
        targetSdkVersion 36
        versionCode 1
        versionName "1.0.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildTypes {
        release {
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

dependencies {
    // Basic AndroidX core for Flutter compatibility
    implementation "androidx.core:core-ktx:1.13.1"
}
