plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
    id "dev.flutter.flutter-gradle-plugin"
}

flutter {
    source '../..'
}

android {
    namespace "com.maamahsmix.app"
    compileSdk 35

    defaultConfig {
        applicationId "com.maamahsmix.app"
        minSdkVersion 26       // Android 8.0+
        targetSdkVersion 35
        versionCode 1
        versionName "1.0.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
        }
    }
}
