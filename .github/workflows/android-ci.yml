name: Android CI (Debug APK)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build Debug APK (android subproject)
        shell: bash
        run: |
          set -euo pipefail

          # Build the Gradle project located in ./android
          if [ -f "./android/gradlew" ]; then
            chmod +x ./android/gradlew
            ./android/gradlew assembleDebug
          else
            chmod +x ./gradlew
            ./gradlew -p android assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
