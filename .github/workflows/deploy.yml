name: Build and Deploy Flutter Web

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter (latest stable)
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Enable Flutter Web
        run: flutter config --enable-web

      - name: Generate web folder (if missing)
        run: |
          set -euo pipefail
          if [ ! -d "web" ] || [ ! -f "web/index.html" ]; then
            echo "web/ folder missing. Generating web template..."
            rm -rf tmp_web web
            flutter create --platforms web --project-name ift tmp_web
            mv tmp_web/web ./web
            rm -rf tmp_web
          else
            echo "web/ folder exists. Skipping generation."
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          channelId: live
          projectId: ift-1336f
