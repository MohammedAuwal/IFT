name: Android Build (Debug)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Cache the debug keystore so SHA-1 stays stable across workflow runs
      - name: Cache Android debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-v1

      # Create android/app/google-services.json from a GitHub Secret (Base64)
      - name: Restore google-services.json (Firebase)
        shell: bash
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          set -euo pipefail

          if [ -z "${GOOGLE_SERVICES_JSON_B64:-}" ]; then
            echo "ERROR: Missing secret GOOGLE_SERVICES_JSON_B64"
            exit 1
          fi

          mkdir -p android/app
          echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > android/app/google-services.json

          echo "google-services.json restored:"
          ls -la android/app/google-services.json

      - name: Bootstrap Gradle wrapper (if missing)
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "android/gradlew" ]; then
            echo "android/gradlew exists, skipping wrapper bootstrap."
            exit 0
          fi

          echo "android/gradlew not found. Bootstrapping wrapper using Gradle 8.3..."

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends unzip curl
          sudo apt-get clean

          cd "$RUNNER_TEMP"
          curl -L --fail -o gradle-8.3-bin.zip https://services.gradle.org/distributions/gradle-8.3-bin.zip
          unzip -q gradle-8.3-bin.zip

          "$RUNNER_TEMP/gradle-8.3/bin/gradle" -p "$GITHUB_WORKSPACE/android" wrapper --gradle-version 8.3
          chmod +x "$GITHUB_WORKSPACE/android/gradlew"

      - name: Print signing report (SHA-1 for Firebase / Google Sign-In)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android/gradlew
          cd android
          ./gradlew :app:signingReport

      - name: Build Debug APK (android/)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
