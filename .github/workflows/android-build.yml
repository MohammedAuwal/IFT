name: Android Build (Debug APK)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - name: Bootstrap Gradle wrapper (if missing)
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "android/gradlew" ]; then
            chmod +x android/gradlew
            exit 0
          fi

          sudo apt-get update
          sudo apt-get install -y --no-install-recommends unzip curl
          sudo apt-get clean

          cd "$RUNNER_TEMP"
          curl -L --fail -o gradle-8.3-bin.zip https://services.gradle.org/distributions/gradle-8.3-bin.zip
          unzip -q gradle-8.3-bin.zip

          "$RUNNER_TEMP/gradle-8.3/bin/gradle" -p "$GITHUB_WORKSPACE/android" wrapper --gradle-version 8.3
          chmod +x "$GITHUB_WORKSPACE/android/gradlew"

      - name: Build Debug APK
        shell: bash
        run: |
          set -euo pipefail
          cd android
          ./gradlew --no-daemon clean assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
