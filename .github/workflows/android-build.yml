name: Android Build (Flutter APK)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ---------------------------------------------------------
      # 👇 THIS STEP PRINTS YOUR SHA-1 KEY TO THE LOGS
      # ---------------------------------------------------------
      - name: Generate and Print SHA-1 Fingerprint
        run: |
          # Create the debug keystore if it doesn't exist
          mkdir -p ~/.android/
          keytool -genkey -v -keystore ~/.android/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          
          echo "=========================================="
          echo "👇 COPY THE SHA-1 BELOW FOR FIREBASE 👇"
          echo "=========================================="
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep "SHA1: "
          echo "=========================================="

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "Creating google-services.json from secret..."
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > android/app/google-services.json
          else
            echo "WARNING: GOOGLE_SERVICES_JSON_B64 secret is missing. App will crash on startup."
          fi

      - name: Build Debug APK
        run: flutter build apk --debug --no-tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
