name: Android Build (Debug)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # Optional: keep debug signing stable across runs (so installs update instead of failing)
      - name: Cache Android debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android/debug.keystore
          key: android-debug-keystore-v1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # If you want to keep google-services.json out of git:
      # Create a multi-line secret named GOOGLE_SERVICES_JSON.
      # If secret is not set, this step will NOT overwrite your committed file.
      - name: Restore google-services.json (optional)
        shell: bash
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          set -euo pipefail
          if [ -n "${GOOGLE_SERVICES_JSON:-}" ]; then
            mkdir -p android/app
            printf '%s' "$GOOGLE_SERVICES_JSON" | tr -d '\r' > android/app/google-services.json
            python3 - <<'PY'
          import json
          json.load(open("android/app/google-services.json","r",encoding="utf-8"))
          print("google-services.json OK")
          PY
          else
            echo "GOOGLE_SERVICES_JSON secret not set. Using repo file if present."
          fi

      - name: Flutter pub get
        shell: bash
        run: |
          set -euo pipefail
          flutter pub get

      - name: Build Debug APK (Flutter)
        shell: bash
        run: |
          set -euo pipefail
          flutter build apk --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
