name: Print Release Keystore SHA (upload-keystore.jks)

on:
  workflow_dispatch:

jobs:
  print-sha:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      KEYSTORE_PATH: android/app/upload-keystore.jks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Decode keystore from secret
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$KEYSTORE_PATH")"
          rm -f "$KEYSTORE_PATH"
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$KEYSTORE_PATH"
          echo "Keystore written to $KEYSTORE_PATH"

      - name: Print SHA-1 and SHA-256
        run: |
          set -euo pipefail
          echo "----- KEYTOOL OUTPUT (filtered) -----"
          keytool -list -v \
            -keystore "$KEYSTORE_PATH" \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -storepass "${{ secrets.KEY_STORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
          | grep -E "Alias name:|SHA1:|SHA-1:|SHA256:|SHA-256:" || true
          echo "-------------------------------------"
