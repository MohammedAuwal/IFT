name: Print SHA1

on:
  workflow_dispatch:

jobs:
  sha1:
    runs-on: ubuntu-latest
    steps:
      - name: Generate and print debug SHA1
        run: |
          mkdir -p ~/.android
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

          echo "==== SHA1 BELOW ===="
          keytool -list -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -storepass android \
            -keypass android | grep "SHA1:"
