name: Android Build (Flutter APK)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      KEYSTORE_PATH: android/app/upload-keystore.jks

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ================================================================
      # STEP 1: Clean old artifacts
      # ================================================================
      - name: Clean old build artifacts
        run: |
          set -euo pipefail
          rm -rf build/ .dart_tool/ android/.gradle/ android/app/build/ || true
          echo "✅ Clean complete"

      # ================================================================
      # STEP 2: Setup assets
      # ================================================================
      - name: Setup asset directories
        run: |
          set -euo pipefail
          mkdir -p assets
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          # Create launch_background if missing
          if [ ! -f android/app/src/main/res/drawable/launch_background.xml ]; then
            cat > android/app/src/main/res/drawable/launch_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@android:color/white" />
          </layer-list>
          EOF
          fi
          echo "✅ Asset directories ready"

      # ================================================================
      # STEP 3: Download icons from Google Drive
      # ================================================================
      - name: Download icon assets
        run: |
          set -euo pipefail

          GDRIVE_FILE_ID="164k4efk8aP4k7FcCohKKlvH7cplaL5Ze"
          MAX_RETRIES=5
          RETRY_DELAY=5
          OUTPUT="assets/icon.png"

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Attempt ${attempt}/${MAX_RETRIES}..."

            curl -sL \
              "https://drive.usercontent.google.com/download?id=${GDRIVE_FILE_ID}&export=download&confirm=t" \
              -o "${OUTPUT}.tmp" || true

            if [ -s "${OUTPUT}.tmp" ]; then
              FILE_TYPE=$(file "${OUTPUT}.tmp")
              echo "Downloaded file type: $FILE_TYPE"

              if echo "$FILE_TYPE" | grep -qi "png\|image"; then
                mv "${OUTPUT}.tmp" "$OUTPUT"
                echo "✅ Icon downloaded successfully"
                cp "$OUTPUT" assets/icon_foreground.png
                break
              else
                echo "❌ Not a valid image, retrying..."
                rm -f "${OUTPUT}.tmp"
              fi
            else
              echo "❌ Empty file, retrying..."
              rm -f "${OUTPUT}.tmp"
            fi

            if [ $attempt -eq $MAX_RETRIES ]; then
              echo "❌ FATAL: Failed to download icon after ${MAX_RETRIES} attempts"
              exit 1
            fi

            sleep $((RETRY_DELAY * attempt))
          done

      # ================================================================
      # STEP 4: Flutter pub get
      # ================================================================
      - name: Flutter pub get
        run: |
          flutter pub get
          echo "✅ Flutter dependencies installed"

      # ================================================================
      # STEP 5: Generate launcher icons
      # ================================================================
      - name: Generate launcher icons
        run: |
          set -euo pipefail
          dart run flutter_launcher_icons
          echo "✅ All launcher icons generated"

      # ================================================================
      # STEP 6: Verify Firebase config
      # ================================================================
      - name: Verify google-services.json
        run: |
          if [ ! -f android/app/google-services.json ]; then
            echo "❌ FATAL: google-services.json missing!"
            exit 1
          fi
          echo "✅ google-services.json found"

      # ================================================================
      # STEP 7: Decode Keystore
      # ================================================================
      - name: Decode keystore
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "❌ FATAL: KEYSTORE_BASE64 secret is empty!"
            exit 1
          fi
          mkdir -p "$(dirname "$KEYSTORE_PATH")"
          rm -f "$KEYSTORE_PATH"
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$KEYSTORE_PATH"
          echo "✅ Keystore decoded successfully ($(wc -c < "$KEYSTORE_PATH") bytes)"

      # ================================================================
      # STEP 8: Verify Keystore & Passwords Integrity
      # ================================================================
      - name: Verify keystore integrity
        run: |
          set -euo pipefail

          # 1. Verify Store Password
          echo "Verifying Store Password..."
          keytool -list -keystore "$KEYSTORE_PATH" -storepass "${{ secrets.KEY_STORE_PASSWORD }}" > /dev/null || {
            echo "❌ FATAL: KEY_STORE_PASSWORD is incorrect or keystore corrupted!"
            exit 1
          }

          # 2. Verify Key Password and Alias (This prevents BadPaddingException)
          echo "Verifying Key Password and Alias..."
          keytool -list -v -keystore "$KEYSTORE_PATH" \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -storepass "${{ secrets.KEY_STORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" > /dev/null || {
            echo "❌ FATAL: KEY_PASSWORD or KEY_ALIAS is incorrect!"
            echo "This is the cause of the BadPaddingException."
            exit 1
          }

          echo "✅ Keystore and all passwords verified!"

      # ================================================================
      # STEP 9: Create key.properties
      # ================================================================
      - name: Create key.properties
        run: |
          set -euo pipefail

          # Path Fix: storeFile must be relative to the 'android' folder
          # Since the .jks is in 'android/app/', we use 'app/upload-keystore.jks'
          cat > android/key.properties << EOF
          storeFile=app/upload-keystore.jks
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

          echo "✅ key.properties created successfully"

      # ================================================================
      # STEP 10: Build Release APK
      # ================================================================
      - name: Build Release APK
        run: |
          set -euo pipefail
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --android-skip-build-dependency-validation

          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ FATAL: Release APK was not created!"
            exit 1
          fi
          echo "✅ Release APK built successfully!"

      # ================================================================
      # STEP 11: Upload APK artifact
      # ================================================================
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
