name: Android Build (Flutter APK)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      KEYSTORE_PATH: android/app/upload-keystore.jks

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ================================================================
      # STEP 1: Clean old artifacts
      # ================================================================
      - name: Clean old build artifacts
        run: |
          set -euo pipefail
          rm -rf build/ .dart_tool/ android/.gradle/ android/app/build/ || true
          echo "Clean complete"

      # ================================================================
      # STEP 2: Setup assets
      # ================================================================
      - name: Setup asset directories
        run: |
          set -euo pipefail
          mkdir -p assets
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          # Create launch_background if missing
          if [ ! -f android/app/src/main/res/drawable/launch_background.xml ]; then
            cat > android/app/src/main/res/drawable/launch_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@android:color/white" />
          </layer-list>
          EOF
          fi

      # ================================================================
      # STEP 3: Download icons from Google Drive
      # ================================================================
      - name: Download icon assets
        run: |
          set -euo pipefail

          GDRIVE_FILE_ID="164k4efk8aP4k7FcCohKKlvH7cplaL5Ze"
          MAX_RETRIES=5
          RETRY_DELAY=5
          OUTPUT="assets/icon.png"

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Attempt ${attempt}/${MAX_RETRIES}..."

            # Try direct Google Drive download
            curl -sL \
              "https://drive.usercontent.google.com/download?id=${GDRIVE_FILE_ID}&export=download&confirm=t" \
              -o "${OUTPUT}.tmp" || true

            # Validate file
            if [ -s "${OUTPUT}.tmp" ]; then
              FILE_TYPE=$(file "${OUTPUT}.tmp")
              echo "Downloaded file type: $FILE_TYPE"

              if echo "$FILE_TYPE" | grep -qi "png\|image"; then
                mv "${OUTPUT}.tmp" "$OUTPUT"
                echo "✅ Icon downloaded successfully"
                cp "$OUTPUT" assets/icon_foreground.png
                break
              else
                echo "❌ Not a valid image, retrying..."
                rm -f "${OUTPUT}.tmp"
              fi
            else
              echo "❌ Empty file, retrying..."
              rm -f "${OUTPUT}.tmp"
            fi

            if [ $attempt -eq $MAX_RETRIES ]; then
              echo "FATAL: Failed to download icon after ${MAX_RETRIES} attempts"
              exit 1
            fi

            sleep $((RETRY_DELAY * attempt))
          done

          echo "Final assets:"
          ls -lh assets/

      # ================================================================
      # STEP 4: Flutter setup
      # ================================================================
      - name: Flutter pub get
        run: flutter pub get

      # ================================================================
      # STEP 5: Generate launcher icons
      # ================================================================
      - name: Generate launcher icons
        run: |
          set -euo pipefail
          dart run flutter_launcher_icons

          echo "Generated icons:"
          find android/app/src/main/res/mipmap-* -type f | sort

          # Verify required icons exist
          for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            FILE="android/app/src/main/res/mipmap-${density}/ic_launcher.png"
            if [ ! -f "$FILE" ]; then
              echo "FATAL: Missing $FILE"
              exit 1
            fi
            echo "✅ $FILE ($(stat -c%s "$FILE") bytes)"
          done

      # ================================================================
      # STEP 6: Verify Firebase config
      # ================================================================
      - name: Verify google-services.json
        run: |
          test -f android/app/google-services.json && \
          echo "✅ google-services.json found" || \
          (echo "❌ google-services.json missing!" && exit 1)

      # ================================================================
      # STEP 7: Setup signing
      # ================================================================
      - name: Decode keystore
        run: |
          set -euo pipefail

          # Validate secret exists
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "FATAL: KEYSTORE_BASE64 secret is empty!"
            exit 1
          fi

          # Decode keystore
          printf '%s' "${{ secrets.KEYSTORE_BASE64 }}" | \
            base64 --decode > "$KEYSTORE_PATH"

          # Validate keystore size
          KEYSTORE_SIZE=$(wc -c < "$KEYSTORE_PATH")
          echo "Keystore size: ${KEYSTORE_SIZE} bytes"

          if [ "$KEYSTORE_SIZE" -lt 100 ]; then
            echo "FATAL: Keystore is too small (${KEYSTORE_SIZE} bytes)!"
            exit 1
          fi

          echo "✅ Keystore decoded successfully"

      - name: Verify keystore
        run: |
          keytool -list -v \
            -keystore "$KEYSTORE_PATH" \
            -storepass "${{ secrets.KEY_STORE_PASSWORD }}" \
            2>&1 | grep -E "Alias|Valid|Entry type|✅|❌" || true
          echo "✅ Keystore verified"

      - name: Create key.properties
        run: |
          cat > android/key.properties << EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF
          echo "✅ key.properties created"

      # ================================================================
      # STEP 8: Build
      # ================================================================
      - name: Build Release APK
        run: |
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --android-skip-build-dependency-validation

      # ================================================================
      # STEP 9: Upload artifact
      # ================================================================
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
