name: Android Build (Flutter APK)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      KEYSTORE_PATH: android/app/upload-keystore.jks

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ================================================================
      # STEP 1: Clean old artifacts
      # ================================================================
      - name: Clean old build artifacts
        run: |
          set -euo pipefail
          rm -rf build/ .dart_tool/ android/.gradle/ android/app/build/ || true
          echo "✅ Clean complete"

      # ================================================================
      # STEP 2: Setup assets
      # ================================================================
      - name: Setup asset directories
        run: |
          set -euo pipefail
          mkdir -p assets
          mkdir -p android/app/src/main/res/drawable
          mkdir -p android/app/src/main/res/mipmap-hdpi
          mkdir -p android/app/src/main/res/mipmap-mdpi
          mkdir -p android/app/src/main/res/mipmap-xhdpi
          mkdir -p android/app/src/main/res/mipmap-xxhdpi
          mkdir -p android/app/src/main/res/mipmap-xxxhdpi

          # Create launch_background if missing
          if [ ! -f android/app/src/main/res/drawable/launch_background.xml ]; then
            cat > android/app/src/main/res/drawable/launch_background.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <layer-list xmlns:android="http://schemas.android.com/apk/res/android">
              <item android:drawable="@android:color/white" />
          </layer-list>
          EOF
          fi
          echo "✅ Asset directories ready"

      # ================================================================
      # STEP 3: Download icons from Google Drive
      # ================================================================
      - name: Download icon assets
        run: |
          set -euo pipefail

          GDRIVE_FILE_ID="164k4efk8aP4k7FcCohKKlvH7cplaL5Ze"
          MAX_RETRIES=5
          RETRY_DELAY=5
          OUTPUT="assets/icon.png"

          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "Attempt ${attempt}/${MAX_RETRIES}..."

            curl -sL \
              "https://drive.usercontent.google.com/download?id=${GDRIVE_FILE_ID}&export=download&confirm=t" \
              -o "${OUTPUT}.tmp" || true

            if [ -s "${OUTPUT}.tmp" ]; then
              FILE_TYPE=$(file "${OUTPUT}.tmp")
              echo "Downloaded file type: $FILE_TYPE"

              if echo "$FILE_TYPE" | grep -qi "png\|image"; then
                mv "${OUTPUT}.tmp" "$OUTPUT"
                echo "✅ Icon downloaded successfully"
                cp "$OUTPUT" assets/icon_foreground.png
                break
              else
                echo "❌ Not a valid image, retrying..."
                rm -f "${OUTPUT}.tmp"
              fi
            else
              echo "❌ Empty file, retrying..."
              rm -f "${OUTPUT}.tmp"
            fi

            if [ $attempt -eq $MAX_RETRIES ]; then
              echo "❌ FATAL: Failed to download icon after ${MAX_RETRIES} attempts"
              exit 1
            fi

            sleep $((RETRY_DELAY * attempt))
          done

          echo "Final assets:"
          ls -lh assets/

      # ================================================================
      # STEP 4: Flutter pub get
      # ================================================================
      - name: Flutter pub get
        run: |
          flutter pub get
          echo "✅ Flutter dependencies installed"

      # ================================================================
      # STEP 5: Generate launcher icons
      # ================================================================
      - name: Generate launcher icons
        run: |
          set -euo pipefail
          dart run flutter_launcher_icons

          echo "Generated icons:"
          find android/app/src/main/res/mipmap-* -type f | sort

          # Verify required icons exist
          for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
            FILE="android/app/src/main/res/mipmap-${density}/ic_launcher.png"
            if [ ! -f "$FILE" ]; then
              echo "❌ FATAL: Missing $FILE"
              exit 1
            fi
            echo "✅ $FILE ($(stat -c%s "$FILE") bytes)"
          done
          echo "✅ All launcher icons generated"

      # ================================================================
      # STEP 6: Verify Firebase config
      # ================================================================
      - name: Verify google-services.json
        run: |
          if [ ! -f android/app/google-services.json ]; then
            echo "❌ FATAL: google-services.json missing!"
            exit 1
          fi
          echo "✅ google-services.json found"

      # ================================================================
      # STEP 7: Decode Keystore
      # ================================================================
      - name: Decode keystore
        run: |
          set -euo pipefail

          # Validate secret is not empty
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "❌ FATAL: KEYSTORE_BASE64 secret is empty!"
            echo "Fix: base64 -w 0 upload-keystore.jks and add to GitHub Secrets"
            exit 1
          fi

          # Ensure directory exists
          mkdir -p "$(dirname "$KEYSTORE_PATH")"

          # Remove any existing corrupted keystore
          rm -f "$KEYSTORE_PATH"

          # ✅ Decode using echo with base64 --decode
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$KEYSTORE_PATH"

          # Validate decoded file exists
          if [ ! -f "$KEYSTORE_PATH" ]; then
            echo "❌ FATAL: Keystore file was not created!"
            exit 1
          fi

          # Validate decoded file size
          KEYSTORE_SIZE=$(wc -c < "$KEYSTORE_PATH")
          echo "Keystore size: ${KEYSTORE_SIZE} bytes"

          if [ "$KEYSTORE_SIZE" -lt 1000 ]; then
            echo "❌ FATAL: Keystore too small (${KEYSTORE_SIZE} bytes) - corrupted!"
            echo "Fix: Re-encode with: base64 -w 0 upload-keystore.jks"
            rm -f "$KEYSTORE_PATH"
            exit 1
          fi

          echo "✅ Keystore decoded successfully (${KEYSTORE_SIZE} bytes)"

      # ================================================================
      # STEP 8: Verify Keystore Integrity
      # ================================================================
      - name: Verify keystore integrity
        run: |
          set -euo pipefail

          echo "=== Keystore Details ==="

          # Full verification with alias and validity check
          keytool -list -v \
            -keystore "$KEYSTORE_PATH" \
            -storepass "${{ secrets.KEY_STORE_PASSWORD }}" \
            2>&1 | grep -E "Alias name|Entry type|Valid from|Valid until|Owner|Issuer" || {
              echo "❌ FATAL: Keystore verification failed!"
              echo "Possible causes:"
              echo "  1. Wrong KEY_STORE_PASSWORD secret"
              echo "  2. Corrupted Base64 encoding"
              echo "  3. Wrong keystore file encoded"
              exit 1
            }

          # Verify the alias exists
          ALIAS_CHECK=$(keytool -list \
            -keystore "$KEYSTORE_PATH" \
            -storepass "${{ secrets.KEY_STORE_PASSWORD }}" \
            2>&1 | grep -i "${{ secrets.KEY_ALIAS }}" || true)

          if [ -z "$ALIAS_CHECK" ]; then
            echo "❌ FATAL: Alias '${{ secrets.KEY_ALIAS }}' not found in keystore!"
            echo "Available aliases:"
            keytool -list \
              -keystore "$KEYSTORE_PATH" \
              -storepass "${{ secrets.KEY_STORE_PASSWORD }}" \
              2>&1 | grep "," || true
            exit 1
          fi

          echo "✅ Alias '${{ secrets.KEY_ALIAS }}' found in keystore"
          echo "✅ Keystore integrity verified!"

      # ================================================================
      # STEP 9: Create key.properties
      # ================================================================
      - name: Create key.properties
        run: |
          set -euo pipefail

          # Validate all required secrets exist
          if [ -z "${{ secrets.KEY_STORE_PASSWORD }}" ]; then
            echo "❌ FATAL: KEY_STORE_PASSWORD secret is empty!"
            exit 1
          fi

          if [ -z "${{ secrets.KEY_ALIAS }}" ]; then
            echo "❌ FATAL: KEY_ALIAS secret is empty!"
            exit 1
          fi

          if [ -z "${{ secrets.KEY_PASSWORD }}" ]; then
            echo "❌ FATAL: KEY_PASSWORD secret is empty!"
            exit 1
          fi

          # Write key.properties
          # Note: storeFile uses filename only (build.gradle resolves relative to android/app/)
          cat > android/key.properties << EOF
          storeFile=upload-keystore.jks
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

          # Verify file was created
          if [ ! -f android/key.properties ]; then
            echo "❌ FATAL: key.properties was not created!"
            exit 1
          fi

          echo "✅ key.properties created successfully"
          echo "=== key.properties contents (passwords masked) ==="
          sed 's/Password=.*/Password=***/' android/key.properties
          sed -i 's/keyPassword=.*/keyPassword=***/' android/key.properties || true

      # ================================================================
      # STEP 10: Build Release APK
      # ================================================================
      - name: Build Release APK
        run: |
          set -euo pipefail

          echo "=== Starting Flutter Release Build ==="
          flutter build apk \
            --release \
            --no-tree-shake-icons \
            --android-skip-build-dependency-validation \
            --verbose 2>&1 | tail -50

          # Verify APK was created
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "❌ FATAL: Release APK was not created!"
            exit 1
          fi

          APK_SIZE=$(stat -c%s "$APK_PATH")
          echo "✅ Release APK built successfully!"
          echo "📦 APK size: $(numfmt --to=iec-i --suffix=B $APK_SIZE)"
          echo "📍 APK path: $APK_PATH"

      # ================================================================
      # STEP 11: Upload APK artifact
      # ================================================================
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30
